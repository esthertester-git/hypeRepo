<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Slider</title>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CARD SLIDER — USAGE INSTRUCTIONS                           ║
  ╚══════════════════════════════════════════════════════════════╝

  EMBEDDING IN AN IFRAME
  ───────────────────────
    <iframe src="card-slider.html"
            width="100%"
            height="560"
            frameborder="0"
            allowtransparency="true">
    </iframe>

  EDITING CARD CONTENT
  ──────────────────────
  All content is in the CONTENT section at the top of the
  <script> block. Each card has:
    title  — the card heading
    image  — path to your image file, e.g. 'images/photo.jpg'
             Leave as '' to show the placeholder graphic.
    body   — the body text below the image

  COLOUR CYCLING
  ──────────────
  Cards automatically cycle through 3 complementary colour
  schemes. The cycle is defined in the colorSchemes array
  in the <script> block — adjust there if needed.

  ADDING OR REMOVING CARDS
  ──────────────────────────
  Add or remove objects in the items array. The counter,
  dots, and nav buttons update automatically.

  CHANGING THE PAGE TITLE
  ────────────────────────
  Edit the <title> tag above.
-->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: unset;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Counter */
  .card-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
  }

  /* Nav row */
  .nav-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid #e5e7eb;
    background: #ffffff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #374151;
    transition: border-color 0.15s, color 0.15s, transform 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: #2563eb;
    color: #2563eb;
    transform: scale(1.06);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Scene — clips the cards as they fly in/out */
  .scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    /* Height set by JS after measuring cards */
    border-radius: 16px;
  }

  /* Individual card */
  .card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    border-radius: 16px;
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    /* Default: off-screen right */
    transform: translateX(110%) rotate(6deg);
    opacity: 0;
    transition:
      transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
      opacity   0.55s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform, opacity;
  }

  /* Active card — centred, no rotation */
  .card.is-active {
    transform: translateX(0) rotate(0deg);
    opacity: 1;
  }

  /* Exiting to the left (going forward) */
  .card.exit-left {
    transform: translateX(-110%) rotate(-6deg);
    opacity: 0;
  }

  /* Exiting to the right (going back) */
  .card.exit-right {
    transform: translateX(110%) rotate(6deg);
    opacity: 0;
  }

  /* Entering from the right (going forward) — off-screen start position */
  .card.enter-from-right {
    transform: translateX(110%) rotate(6deg);
    opacity: 0;
    transition: none;
  }

  /* Entering from the left (going back) — off-screen start position */
  .card.enter-from-left {
    transform: translateX(-110%) rotate(-6deg);
    opacity: 0;
    transition: none;
  }

  /* Card image area */
  .card-image {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-image img {
    width: auto;
    height: 144px;
    object-fit: contain;
    display: block;
  }

  /* Placeholder shown when no image provided */
  .card-image-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* Card text */
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-body {
    font-size: 14px;
    line-height: 1.7;
    font-weight: 400;
  }

  /* Progress dots */
  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d1d5db;
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .dot.active {
    background: #2563eb;
    transform: scale(1.4);
  }

  @media (max-width: 500px) {
    body { padding: 16px; }
    .card-image { height: 150px; }
    .card-image img { height: 120px; }

    /* Hide desktop flanking buttons */
    .nav-row > .nav-btn { display: none; }

    /* Scene takes full width */
    .scene { width: 100%; }

    /* Show mobile top nav */
    .mobile-nav { display: flex; }

    .card-counter { display: none; }
  }

  /* Mobile top nav — hidden on desktop */
  .mobile-nav {
    display: none;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .mobile-nav .nav-btn { width: 36px; height: 36px; flex-shrink: 0; }

  .mobile-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
    flex: 1;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <div class="card-counter">
    Situation <span id="current-num">1</span> of <span id="total-num">3</span>
  </div>

  <!-- Mobile top nav: arrows flank the counter -->
  <div class="mobile-nav">
    <button class="nav-btn" id="prev-btn-m" disabled aria-label="Previous card">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12.5L5.5 8L10 3.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="mobile-counter">Situation <span id="current-num-m">1</span> of <span id="total-num-m">3</span></span>
    <button class="nav-btn" id="next-btn-m" aria-label="Next card">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" disabled aria-label="Previous card">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12.5L5.5 8L10 3.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="scene" id="scene"></div>

    <button class="nav-btn" id="next-btn" aria-label="Next card">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="dots" id="dots"></div>

</div>

<script>
  // ─── COLOUR SCHEMES (cycles through cards) ───────────────────
  const colorSchemes = [
    {
      bg:        '#ffffff',
      border:    '1px solid #e5e7eb',
      shadow:    '0 1px 3px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.08)',
      title:     '#111827',
      body:      '#6b7280',
      imgBg:     '#f3f4f6',
      imgIcon:   '#d1d5db',
      imgLabel:  '#9ca3af',
    },
    {
      bg:        '#2563eb',
      border:    '1px solid #2563eb',
      shadow:    '0 1px 3px rgba(37,99,235,0.2), 0 8px 24px rgba(37,99,235,0.35)',
      title:     '#ffffff',
      body:      'rgba(255,255,255,0.78)',
      imgBg:     'rgba(255,255,255,0.14)',
      imgIcon:   'rgba(255,255,255,0.5)',
      imgLabel:  'rgba(255,255,255,0.45)',
    },
    {
      bg:        '#eff6ff',
      border:    '1px solid #bfdbfe',
      shadow:    '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(37,99,235,0.1)',
      title:     '#1e3a8a',
      body:      '#374151',
      imgBg:     '#bfdbfe',
      imgIcon:   '#93c5fd',
      imgLabel:  '#60a5fa',
    },
  ];

  // ─── CONTENT ────────────────────────────────────────────────
  const items = [
    {
      title: 'In-person',
      image: '1_in-person.svg',
      body:  'An in-person presentation gives you the most tools to work with: your full body language, the energy of the room, and direct eye contact. Stand when you can, move purposefully, and pay attention to how your audience is responding. Arrive early enough to check the room, test your slides, and give yourself a few quiet minutes to prepare.'
    },
    {
      title: 'Online',
      image: '2_online.svg',
      body:  'Online presentations require extra attention to a few things that are easy to overlook. Look directly at your camera, not at the faces on your screen. Position your camera at eye level, make sure your lighting is in front of you, and check that your audio is clear. Speak slightly more slowly than you would in person and build in slightly longer pauses after key points.'
    },
    {
      title: 'Informal or conversational',
      image: '3_informal.svg',
      body:  'Aim for a natural, conversational tone rather than a polished performance. Start with your one-liner and let the other person\'s response guide where you go next. The goal is engagement, not completion.'
    },
  ];
  // ─────────────────────────────────────────────────────────────

  let currentIndex = 0;
  let isAnimating  = false;
  const total      = items.length;

  const scene    = document.getElementById('scene');
  const dotsEl   = document.getElementById('dots');
  const prevBtn  = document.getElementById('prev-btn');
  const nextBtn  = document.getElementById('next-btn');

  document.getElementById('total-num').textContent   = total;
  document.getElementById('total-num-m').textContent  = total;

  // ── Build cards ─────────────────────────────────────────────
  items.forEach((item, i) => {
    const scheme = colorSchemes[i % colorSchemes.length];
    const card   = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;

    // Image / icon markup
    let imageHTML;
    if (item.image) {
      imageHTML = `<div class="card-image" style="background:${scheme.imgBg}">
        <img src="${item.image}" alt="${item.title}">
      </div>`;
    } else {
      imageHTML = `
        <div class="card-image" style="background:${scheme.imgBg}">
          <div class="card-image-placeholder">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect x="4" y="8" width="32" height="24" rx="3" stroke="${scheme.imgIcon}" stroke-width="1.5"/>
              <circle cx="14" cy="17" r="3" stroke="${scheme.imgIcon}" stroke-width="1.5"/>
              <path d="M4 26l8-6 6 5 5-4 9 7" stroke="${scheme.imgIcon}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span style="color:${scheme.imgLabel}">Image</span>
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-title" style="color:${scheme.title}">${item.title}</div>
      ${imageHTML}
      <div class="card-body" style="color:${scheme.body}">${item.body}</div>
    `;

    card.style.background = scheme.bg;
    card.style.border      = scheme.border;
    card.style.boxShadow   = scheme.shadow;

    scene.appendChild(card);
  });

  // Build dots
  items.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = 'dot-' + i;
    dot.onclick = () => { if (!isAnimating && i !== currentIndex) navigate(i > currentIndex ? 'next' : 'prev', i); };
    dotsEl.appendChild(dot);
  });

  // ── Set scene height after fonts load ───────────────────────
  function setSceneHeight() {
    const sceneW = scene.offsetWidth;
    if (!sceneW) return;
    let maxH = 0;
    document.querySelectorAll('.card').forEach(card => {
      const clone = card.cloneNode(true);
      clone.style.cssText = [
        'position:fixed', 'top:-9999px', 'left:0',
        'width:' + sceneW + 'px', 'height:auto',
        'transform:none', 'opacity:1', 'visibility:hidden'
      ].join(';');
      document.body.appendChild(clone);
      maxH = Math.max(maxH, clone.offsetHeight);
      document.body.removeChild(clone);
    });
    scene.style.height = Math.max(maxH, 200) + 'px';
  }

  setSceneHeight();
  document.fonts.ready.then(setSceneHeight);
  window.addEventListener('resize', setSceneHeight);

  // ── Navigation ───────────────────────────────────────────────
  function navigate(direction, targetIndex) {
    if (isAnimating) return;
    const newIndex = targetIndex !== undefined
      ? targetIndex
      : direction === 'next' ? currentIndex + 1 : currentIndex - 1;

    if (newIndex < 0 || newIndex >= total) return;
    isAnimating = true;

    const outgoing = document.getElementById('card-' + currentIndex);
    const incoming = document.getElementById('card-' + newIndex);

    // Position incoming off-screen instantly (no transition)
    incoming.classList.add(direction === 'next' ? 'enter-from-right' : 'enter-from-left');
    incoming.style.display = 'flex';

    // Force reflow so the browser registers the off-screen position
    incoming.offsetHeight;

    // Remove the instant-position class and start both transitions
    incoming.classList.remove('enter-from-right', 'enter-from-left');

    // Outgoing exits in the opposite direction
    outgoing.classList.remove('is-active');
    outgoing.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');

    // Incoming settles to centre
    incoming.classList.add('is-active');

    // Update state
    currentIndex = newIndex;
    updateUI();

    // Clean up after animation
    setTimeout(() => {
      outgoing.classList.remove('exit-left', 'exit-right');
      isAnimating = false;
    }, 580);
  }

  function updateUI() {
    const n = currentIndex + 1;
    document.getElementById('current-num').textContent   = n;
    document.getElementById('current-num-m').textContent = n;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === total - 1;
    document.getElementById('prev-btn-m').disabled = currentIndex === 0;
    document.getElementById('next-btn-m').disabled = currentIndex === total - 1;
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === currentIndex));
  }

  prevBtn.addEventListener('click', () => navigate('prev'));
  nextBtn.addEventListener('click', () => navigate('next'));
  document.getElementById('prev-btn-m').addEventListener('click', () => navigate('prev'));
  document.getElementById('next-btn-m').addEventListener('click', () => navigate('next'));

  // ── Initialise first card ────────────────────────────────────
  document.getElementById('card-0').classList.add('is-active');
  updateUI();
</script>
</body>
</html>
