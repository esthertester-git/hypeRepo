<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Slider — Cold Outreach Tips</title>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CARD SLIDER — USAGE INSTRUCTIONS                           ║
  ╚══════════════════════════════════════════════════════════════╝

  EMBEDDING IN AN IFRAME
  ───────────────────────
  In the parent page, add the iframe and a message listener so the
  height adjusts automatically to fit the tallest card:

    IFRAME TAG:
    <iframe id="card-slider"
            src="DiscoUI_card-slider-PropelPitchingM3_2.html"
            width="100%"
            height="600"
            frameborder="0"
            allowtransparency="true"></iframe>

    PARENT SCRIPT:
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        document.getElementById('card-slider').style.height
          = e.data.frameHeight + 'px';
      }
    });

  height="600" is a safe initial fallback while fonts load.

  EDITING CARD CONTENT
  ──────────────────────
  All content is in the CONTENT section at the top of the
  <script> block. Each card has:
    title  — the card heading
    svg    — inline SVG string (leave as '' to show placeholder)
    body   — the body text below the image

  LAYOUT
  ──────
  Desktop: nav arrows flank the card on left and right.
  Mobile (container < 480px): arrows move to a top bar
  flanking the counter. Layout switches via JS class.
-->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: unset;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* ── Desktop counter (hidden on mobile) */
  .card-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
  }

  /* ── Mobile top nav: arrows flank counter (hidden on desktop) */
  .top-nav {
    display: none;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .top-nav-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
    flex: 1;
    text-align: center;
  }

  /* ── Main row: [prev] [scene] [next] */
  .main-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Nav buttons */
  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid #e5e7eb;
    background: #ffffff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #374151;
    transition: border-color 0.15s, color 0.15s, transform 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: #2563eb;
    color: #2563eb;
    transform: scale(1.06);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Scene — clips the animation */
  .scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    /* height set by JS */
  }

  /* Individual card */
  .card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    border-radius: 16px;
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateX(110%) rotate(6deg);
    opacity: 0;
    transition:
      transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
      opacity   0.55s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform, opacity;
  }

  .card.is-active   { transform: translateX(0) rotate(0deg); opacity: 1; }
  .card.exit-left   { transform: translateX(-110%) rotate(-6deg); opacity: 0; }
  .card.exit-right  { transform: translateX(110%) rotate(6deg); opacity: 0; }

  .card.enter-from-right {
    transform: translateX(110%) rotate(6deg);
    opacity: 0; transition: none;
  }
  .card.enter-from-left {
    transform: translateX(-110%) rotate(-6deg);
    opacity: 0; transition: none;
  }

  /* Card image */
  .card-image {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-image svg {
    width: auto;
    height: 120px;
    display: block;
  }

  /* Card text */
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-subtitle {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    margin-top: -4px;
  }

  .card-body {
    font-size: 14px;
    line-height: 1.7;
    font-weight: 400;
  }

  /* Progress dots */
  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d1d5db;
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .dot.active {
    background: #2563eb;
    transform: scale(1.4);
  }

  /* ── Mobile overrides via JS .is-mobile class ────────────── */
  .container.is-mobile .card-counter     { display: none; }
  .container.is-mobile .top-nav          { display: flex; }
  .container.is-mobile .main-row .nav-btn { display: none; }
  .container.is-mobile .scene            { flex: none; width: 100%; }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .card-image { height: 160px; }
    .card-image svg { height: 96px; }
    .card-title { font-size: 16px; }
    .card-body  { font-size: 13px; line-height: 1.6; }
  }

  /* ── Launch button ── */
  .launch-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .launch-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #9ca3af;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 50px;
    padding: 5px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.2s ease, color 0.2s ease;
    text-decoration: none;
  }

  .launch-btn:hover {
    border-color: #2563eb;
    color: #2563eb;
  }

  .launch-icon {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
  }
</style>
</head>

  };

  // ─── CONTENT ────────────────────────────────────────────────
  const items = [
    {
      title:    'Writing effective cold outreach',
      subtitle: 'Four principles that get responses.',
      svg:      svgs.outreach,
      body:     'Cold outreach only works when it is done with intention. The tips that follow cover the fundamentals: how to personalise your message, how to frame it around the prospect, how to make it easy to respond, and why following up is a sign of professionalism, not pestering.'
    },
    {
      title:    'Be specific',
      subtitle: 'Generic messages get ignored.',
      svg:      svgs.specific,
      body:     'A message that references something specific about the prospect\'s business, role, or situation signals that you have done your homework. Generic messages get ignored.'
    },
    {
      title:    'Lead with their problem',
      subtitle: 'Your first message is not a pitch.',
      svg:      svgs.problem,
      body:     'It is an attempt to open a conversation. Lead with something relevant and useful to them.'
    },
    {
      title:    'Make the ask small',
      subtitle: 'Lower the barrier to saying yes.',
      svg:      svgs.ask,
      body:     'Asking for a 30-minute call in your first message is a big ask from a stranger. Ask for a short reply to a single question.'
    },
    {
      title:    'Follow up',
      subtitle: 'Most responses come after the second or third follow-up.',
      svg:      svgs.followup,
      body:     'Following up is not pestering. It is professionalism. Your Coach can help you build a follow-up cadence that feels natural.'
    },
  ];

  // ─────────────────────────────────────────────────────────────

  let currentIndex = 0;
  let isAnimating  = false;
  const total      = items.length;

  const container = document.getElementById('container');
  const scene     = document.getElementById('scene');
  const dotsEl    = document.getElementById('dots');
  const prevBtn   = document.getElementById('prev-btn');
  const nextBtn   = document.getElementById('next-btn');
  const prevBtnM  = document.getElementById('prev-btn-m');
  const nextBtnM  = document.getElementById('next-btn-m');

  document.getElementById('total-num').textContent   = total;
  document.getElementById('total-num-m').textContent = total;

  // ── Build cards ─────────────────────────────────────────────
  items.forEach((item, i) => {
    const scheme = colorSchemes[i % colorSchemes.length];
    const card   = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;

    card.innerHTML = `
      <div class="card-title" style="color:${scheme.title}">${item.title}</div>
      <div class="card-subtitle" style="color:${scheme.title}">${item.subtitle}</div>
      <div class="card-image" style="background:${scheme.imgBg}; color:${scheme.imgColor}">
        ${item.svg}
      </div>
      <div class="card-body" style="color:${scheme.body}">${item.body}</div>
    `;
    card.style.background = scheme.bg;
    card.style.border      = scheme.border;
    card.style.boxShadow   = scheme.shadow;
    scene.appendChild(card);
  });

  // ── Build dots ───────────────────────────────────────────────
  items.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = 'dot-' + i;
    dot.onclick = () => { if (!isAnimating && i !== currentIndex) navigate(i > currentIndex ? 'next' : 'prev', i); };
    dotsEl.appendChild(dot);
  });

  // ── Layout: JS toggles .is-mobile based on container width ──
  function applyLayout() {
    container.classList.toggle('is-mobile', container.offsetWidth < 480);
  }

  // ── Scene height: measure tallest card ──────────────────────
  function setSceneHeight() {
    const sceneW = scene.offsetWidth;
    if (!sceneW) return;
    let maxH = 0;
    document.querySelectorAll('.card').forEach(card => {
      const clone = card.cloneNode(true);
      clone.style.cssText = [
        'position:fixed', 'visibility:hidden', 'pointer-events:none',
        'top:-9999px', 'left:0',
        'width:' + sceneW + 'px', 'height:auto',
        'transform:none', 'opacity:1', 'display:flex'
      ].join(';');
      document.body.appendChild(clone);
      maxH = Math.max(maxH, clone.offsetHeight);
      document.body.removeChild(clone);
    });
    scene.style.height = Math.max(maxH, 200) + 24 + 'px';
  }

  function notifyHeight() {
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({ frameHeight: h }, '*');
  }

  applyLayout();
  setSceneHeight();
  notifyHeight();
  document.fonts.ready.then(() => {
    setSceneHeight(); notifyHeight();
    setTimeout(() => { setSceneHeight(); notifyHeight(); }, 350);
  });
  window.addEventListener('resize', () => { applyLayout(); setSceneHeight(); notifyHeight(); });

  // ── Navigation ───────────────────────────────────────────────
  function navigate(direction, targetIndex) {
    if (isAnimating) return;
    const newIndex = targetIndex !== undefined
      ? targetIndex
      : direction === 'next' ? currentIndex + 1 : currentIndex - 1;
    if (newIndex < 0 || newIndex >= total) return;
    isAnimating = true;

    const outgoing = document.getElementById('card-' + currentIndex);
    const incoming = document.getElementById('card-' + newIndex);

    incoming.classList.add(direction === 'next' ? 'enter-from-right' : 'enter-from-left');
    incoming.offsetHeight;
    incoming.classList.remove('enter-from-right', 'enter-from-left');
    outgoing.classList.remove('is-active');
    outgoing.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
    incoming.classList.add('is-active');

    currentIndex = newIndex;
    updateUI();

    setTimeout(() => {
      outgoing.classList.remove('exit-left', 'exit-right');
      isAnimating = false;
    }, 580);
  }

  function updateUI() {
    const n = currentIndex + 1;
    document.getElementById('current-num').textContent   = n;
    document.getElementById('current-num-m').textContent = n;
    prevBtn.disabled  = currentIndex === 0;
    nextBtn.disabled  = currentIndex === total - 1;
    prevBtnM.disabled = currentIndex === 0;
    nextBtnM.disabled = currentIndex === total - 1;
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === currentIndex));
  }

  prevBtn.addEventListener('click',  () => navigate('prev'));
  nextBtn.addEventListener('click',  () => navigate('next'));
  prevBtnM.addEventListener('click', () => navigate('prev'));
  nextBtnM.addEventListener('click', () => navigate('next'));

  // ── Initialise ───────────────────────────────────────────────
  document.getElementById('card-0').classList.add('is-active');
  updateUI();
</script>
